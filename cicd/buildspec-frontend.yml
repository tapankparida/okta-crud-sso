version: 0.2

env:
  shell: bash

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - apt-get update && apt-get install -y jq
  pre_build:
    commands:
      - export APP_STACK_OUTPUTS="$(aws cloudformation describe-stacks --stack-name "$APP_STACK_NAME" --query 'Stacks[0].Outputs' --output json)"
      - export FRONTEND_BUCKET="$(echo "$APP_STACK_OUTPUTS" | jq -r '.[] | select(.OutputKey=="FrontendBucketName") | .OutputValue')"
      - export CLOUDFRONT_DISTRIBUTION_ID="$(echo "$APP_STACK_OUTPUTS" | jq -r '.[] | select(.OutputKey=="CloudFrontDistributionId") | .OutputValue')"
      - export CLOUDFRONT_DOMAIN="$(echo "$APP_STACK_OUTPUTS" | jq -r '.[] | select(.OutputKey=="CloudFrontDomainName") | .OutputValue')"
      - export EB_URL="$(echo "$APP_STACK_OUTPUTS" | jq -r '.[] | select(.OutputKey=="BackendEndpointUrl") | .OutputValue')"
      - export VITE_API_BASE_URL="${EB_URL}/api"
      - export VITE_OKTA_REDIRECT_URI="https://${CLOUDFRONT_DOMAIN}/login/callback"
      - cd frontend
      - npm ci
  build:
    commands:
      - npm run build:prod
  post_build:
    commands:
      - aws s3 sync dist "s3://$FRONTEND_BUCKET" --delete
      - aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"

artifacts:
  base-directory: frontend/dist
  files:
    - "**/*"
